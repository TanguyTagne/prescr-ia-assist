name: Build Asclion Desktop

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      # Build the web app
      - name: Install web dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      # Copy web build into electron
      - name: Copy web build to electron
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path electron/web
          Copy-Item -Recurse -Force dist/* electron/web/

      # Convert PNG icon to ICO (256x256+)
      - name: Generate ICO from PNG
        shell: pwsh
        run: |
          npm install -g png-to-ico
          npx png-to-ico electron/assets/icon.png > electron/assets/icon.ico

      # Build Electron installer
      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Windows installer
        working-directory: electron
        run: npm run build:win -- --publish never

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ github.run_number }}
          name: Asclion v${{ github.run_number }}
          files: electron/dist/*.exe
          generate_release_notes: true
