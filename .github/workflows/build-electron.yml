name: Build PrescrIA Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build the web app
      - name: Install web dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      # Copy web build into electron
      - name: Copy web build to electron
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path electron/web
          Copy-Item -Recurse -Force dist/* electron/web/

      # Build Electron installer
      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Windows installer
        working-directory: electron
        run: npm run build:win -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrescrIA-Windows-Installer
          path: electron/dist/*.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: PrescrIA v${{ github.run_number }}
          files: electron/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
